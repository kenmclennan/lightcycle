name: Version bump

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  bump:
    if: github.event.head_commit.author.name != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Bump patch version if lightcycle changed without a bump
        run: |
          before="${{ github.event.before }}"
          after="${{ github.sha }}"

          if ! git cat-file -e "$before^{commit}" 2>/dev/null; then
            echo "no valid before SHA (new branch); skipping"
            exit 0
          fi

          if ! git diff --name-only "$before" "$after" | grep -qE '^lightcycle/'; then
            echo "push did not touch lightcycle/; skipping"
            exit 0
          fi

          if git diff "$before" "$after" -- lightcycle/__init__.py | grep -qE '^\+__version__'; then
            echo "__version__ already changed in this push; skipping"
            exit 0
          fi

          current=$(sed -nE 's/^__version__ = "([0-9]+\.[0-9]+\.[0-9]+)"$/\1/p' lightcycle/__init__.py)
          if [ -z "$current" ]; then
            echo "could not parse __version__ from lightcycle/__init__.py" >&2
            exit 1
          fi

          major=$(echo "$current" | cut -d. -f1)
          minor=$(echo "$current" | cut -d. -f2)
          patch=$(echo "$current" | cut -d. -f3)
          next="$major.$minor.$((patch + 1))"

          echo "bumping __version__ $current -> $next"
          printf '__version__ = "%s"\n' "$next" > lightcycle/__init__.py

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lightcycle/__init__.py
          git commit -m "chore: bump version to $next"
          git push origin HEAD:main
